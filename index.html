<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaspurrr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;600&family=Unbounded:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --text:#ffffff;--text-muted:#5a5a78;
  --card-bg:rgba(0,0,0,0.58);--card-border:rgba(255,255,255,0.07);
  --radius:14px;
}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;background:#000;color:var(--text);min-height:100vh;overflow-x:hidden}

#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;width:100%;height:100%}

.profile-page{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  padding:68px 20px 90px;min-height:100vh;
}

/* AVATAR */
.avatar-wrap{position:relative;margin-bottom:22px}
.avatar-ring{display:none}
@keyframes ringShimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.avatar-inner{position:relative;z-index:1;width:158px;height:158px;border-radius:50%;border:none;overflow:hidden;background:#111}
.avatar-inner img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
.status-dot{display:none}

/* USERNAME */
.username{
  position:relative;
  font-family:'Unbounded',sans-serif;font-size:2.8rem;font-weight:900;
  letter-spacing:-0.02em;text-align:center;margin-bottom:20px;
  color:#ffffff;
  text-shadow:
    0 0 10px rgba(255,255,255,0.6),
    0 0 22px rgba(255,255,255,0.35),
    0 0 40px rgba(168,230,240,0.25);
  animation:whiteGlow 3.5s ease-in-out infinite;
}
@keyframes whiteGlow{
  0%,100%{text-shadow:0 0 10px rgba(255,255,255,0.6),0 0 22px rgba(255,255,255,0.35),0 0 40px rgba(168,230,240,0.25)}
  50%{text-shadow:0 0 14px rgba(255,255,255,0.85),0 0 30px rgba(255,255,255,0.55),0 0 55px rgba(168,230,240,0.4)}
}
.sparkle{
  position:absolute;pointer-events:none;
  width:8px;height:8px;
  background:radial-gradient(circle,#fff 0%,rgba(255,255,255,0.6) 30%,transparent 70%);
  border-radius:50%;
  opacity:0;
  animation:sparkleAnim 1.8s ease-in-out infinite;
}
.sparkle::before,.sparkle::after{
  content:'';position:absolute;left:50%;top:50%;
  background:#fff;
  transform:translate(-50%,-50%);
}
.sparkle::before{width:1px;height:14px}
.sparkle::after{width:14px;height:1px}
@keyframes sparkleAnim{
  0%,100%{opacity:0;transform:scale(0.3) rotate(0deg)}
  50%{opacity:1;transform:scale(1) rotate(180deg)}
}

/* BIO */
.bio{
  position:relative;
  display:inline-flex;align-items:center;gap:10px;
  padding:9px 18px 9px 14px;
  margin-bottom:26px;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:99px;
  backdrop-filter:blur(14px);
  font-family:'Fira Code',monospace;
  font-size:.82rem;
  color:#d4dae8;
  letter-spacing:.02em;
  min-height:1.4em;
  box-shadow:0 0 0 1px rgba(255,255,255,0.02) inset,0 4px 18px rgba(0,0,0,0.4);
  overflow:hidden;
}
.bio::before{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
  animation:bioShine 4.5s ease-in-out infinite;
}
@keyframes bioShine{
  0%{left:-100%}60%{left:120%}100%{left:120%}
}
.bio-text{color:#e8ecf5}
.bio-text .accent{
  color:#fff;
  font-weight:600;
  text-shadow:0 0 10px rgba(255,255,255,0.4);
}
.cursor-blink{display:inline-block;width:2px;height:.9em;background:#4eb8d4;margin-left:2px;animation:blink .75s step-end infinite;vertical-align:text-bottom;box-shadow:0 0 6px #4eb8d4}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* SOCIALS */
.social-group{display:flex;gap:10px;margin-bottom:14px}
.social-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;text-decoration:none}
.social-icon{
  width:44px;height:44px;border-radius:12px;
  background:rgba(0,0,0,0.65);border:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,0.28);
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
  backdrop-filter:blur(12px);
}
.social-icon:hover{border-color:rgba(77,184,212,0.3);color:rgba(168,230,240,0.8);transform:translateY(-5px) scale(1.08);box-shadow:0 10px 28px rgba(0,0,0,0.6),0 0 18px rgba(77,184,212,0.1);background:rgba(0,0,0,0.8)}
.social-icon svg{width:19px;height:19px;fill:currentColor}
.social-label{font-size:.58rem;font-family:'Fira Code',monospace;color:rgba(255,255,255,0.2);letter-spacing:.06em;opacity:0;transform:translateY(3px);transition:all .2s}
.social-wrap:hover .social-label{opacity:1;transform:translateY(0);color:rgba(168,230,240,0.5)}

/* LINK CARDS */
.links-container{display:flex;flex-direction:column;gap:10px;width:100%;max-width:440px;margin-top:4px}

.link-card{
  position:relative;overflow:hidden;
  display:flex;align-items:center;gap:14px;padding:14px 20px;
  background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.07);
  border-radius:var(--radius);text-decoration:none;color:var(--text);
  transition:all .3s cubic-bezier(.22,1,.36,1);
  backdrop-filter:blur(20px);cursor:pointer;
}
.link-card::after{content:'';position:absolute;top:0;left:-60%;width:55%;height:1px;background:linear-gradient(90deg,transparent,rgba(168,230,240,0.35),transparent)}
.link-card:hover{background:rgba(0,0,0,0.72);border-color:rgba(77,184,212,0.22);transform:translateY(-3px) translateX(2px);box-shadow:0 16px 40px rgba(0,0,0,0.65),0 0 22px rgba(77,184,212,0.05)}
.link-card:hover::after{animation:scanLine .55s ease forwards}
@keyframes scanLine{from{left:-60%}to{left:110%}}

.link-card .ripple{position:absolute;border-radius:50%;background:rgba(77,184,212,0.1);transform:scale(0);animation:rip .6s ease-out forwards;pointer-events:none}
@keyframes rip{to{transform:scale(4);opacity:0}}

.link-icon{
  width:40px;height:40px;border-radius:10px;
  background:#000;border:1px solid rgba(255,255,255,0.09);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.link-icon svg{width:18px;height:18px;fill:#fff}

.link-info{display:flex;flex-direction:column;gap:1px;flex:1}
.link-title{font-weight:600;font-size:.94rem;color:var(--text)}
.link-sub{font-size:.7rem;color:var(--text-muted);font-family:'Fira Code',monospace}

.link-arrow{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);color:var(--text-muted);font-size:13px;transition:all .25s;flex-shrink:0}
.link-card:hover .link-arrow{background:rgba(77,184,212,0.09);border-color:rgba(77,184,212,0.2);color:#a8e6f0;transform:translateX(3px)}

/* FOOTER - sparkle white */
.footer{
  margin-top:50px;
  font-family:'Fira Code',monospace;font-size:.7rem;
  letter-spacing:.08em;text-align:center;line-height:1.6;
  position:relative;
}
.footer-inner{
  display:inline-block;
  position:relative;
  color:#ffffff;
  text-shadow:
    0 0 8px rgba(255,255,255,0.9),
    0 0 18px rgba(255,255,255,0.6),
    0 0 35px rgba(168,230,240,0.4),
    0 0 60px rgba(168,230,240,0.2);
  animation:footerGlow 3s ease-in-out infinite;
}
@keyframes footerGlow{
  0%,100%{text-shadow:0 0 8px rgba(255,255,255,0.9),0 0 18px rgba(255,255,255,0.6),0 0 35px rgba(168,230,240,0.4),0 0 60px rgba(168,230,240,0.2)}
  50%{text-shadow:0 0 12px rgba(255,255,255,1),0 0 28px rgba(255,255,255,0.85),0 0 55px rgba(168,230,240,0.65),0 0 90px rgba(168,230,240,0.35)}
}
.footer .heart{display:inline-block;color:#ff5a7a;animation:heartBeat 1.6s ease-in-out infinite;transform-origin:center;filter:drop-shadow(0 0 6px rgba(255,90,122,0.8))}
@keyframes heartBeat{0%,100%{transform:scale(1)}25%{transform:scale(1.22)}50%{transform:scale(0.95)}75%{transform:scale(1.15)}}
.footer a{color:#ffffff;text-decoration:none;transition:all .25s;font-weight:600}
.footer a:hover{color:#a8e6f0;text-shadow:0 0 15px rgba(168,230,240,0.9)}
.footer-sparkle{
  position:absolute;pointer-events:none;
  background:radial-gradient(circle,#fff 0%,rgba(255,255,255,0.5) 40%,transparent 70%);
  border-radius:50%;
  opacity:0;
  animation:fSparkle 2.2s ease-in-out infinite;
}
.footer-sparkle::before,.footer-sparkle::after{
  content:'';position:absolute;left:50%;top:50%;
  background:#fff;transform:translate(-50%,-50%);
}
.footer-sparkle::before{width:1px;height:10px}
.footer-sparkle::after{width:10px;height:1px}
@keyframes fSparkle{
  0%,100%{opacity:0;transform:scale(0.2) rotate(0deg)}
  50%{opacity:1;transform:scale(1) rotate(180deg)}
}

/* ENTRY ANIMS */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.profile-page>*{animation:fadeUp .7s cubic-bezier(.22,1,.36,1) backwards}
.profile-page>*:nth-child(1){animation-delay:.05s}.profile-page>*:nth-child(2){animation-delay:.12s}
.profile-page>*:nth-child(3){animation-delay:.18s}.profile-page>*:nth-child(4){animation-delay:.25s}
.profile-page>*:nth-child(5){animation-delay:.32s}.profile-page>*:nth-child(6){animation-delay:.38s}

@media(max-width:520px){.username{font-size:2rem}.avatar-inner{width:108px;height:108px}.bio{font-size:.74rem;padding:8px 14px 8px 12px}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#000}::-webkit-scrollbar-thumb{background:rgba(77,184,212,0.12);border-radius:2px}
</style>
</head>

      <div class="link-icon"><svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1.17A3 3 0 0 1 18 21H6a3 3 0 0 1-2.83-2H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2zM9 14a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm6 0a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/></svg></div>

<script>
// ANIMATED BACKGROUND
const cv = document.getElementById('bgCanvas');
const cx = cv.getContext('2d');
function resize(){ cv.width = innerWidth; cv.height = innerHeight; }
addEventListener('resize', resize); resize();

const drops = [];
for(let i=0;i<130;i++) drops.push({
  x: Math.random()*window.innerWidth,
  y: Math.random()*-1500,
  len: Math.random()*55+18,
  speed: Math.random()*7+8,
  alpha: Math.random()*0.65+0.15,
  w: Math.random()<0.18?1.6:0.75,
  bright: Math.random()>0.78
});

const lights=[];
for(let i=0;i<240;i++) lights.push({
  x: Math.random()*window.innerWidth,
  yFrac: 0.60+Math.random()*0.28,
  r: Math.random()*2.0+0.4,
  baseA: Math.random()*0.55+0.2,
  flk: Math.random()*0.04+0.005,
  ph: Math.random()*Math.PI*2,
  drift: (Math.random()-0.5)*0.15,
  bobAmp: Math.random()*1.5+0.3,
  bobSpeed: Math.random()*0.6+0.3,
  col: Math.random()>0.82 ? `hsl(${Math.random()*60|0},80%,85%)` : '#fff'
});

const streaks=[];
for(let i=0;i<70;i++) streaks.push({
  x: Math.random()*window.innerWidth,
  yFrac: 0.75+Math.random()*0.2,
  w: Math.random()*9+1,
  h: Math.random()*1.4+0.4,
  a: Math.random()*0.28+0.05,
  drift:(Math.random()-0.5)*0.3
});

const fog=[];
for(let i=0;i<6;i++) fog.push({
  x:Math.random()*window.innerWidth,
  y:Math.random()*window.innerHeight*0.6,
  r:Math.random()*250+180,
  speed:(Math.random()*0.2+0.05)*(Math.random()<0.5?1:-1),
  a:Math.random()*0.04+0.02
});

let t=0;
function frame(){
  t+=0.016;
  const W=cv.width, H=cv.height;
  cx.clearRect(0,0,W,H);

  const sky=cx.createLinearGradient(0,0,0,H*0.72);
  sky.addColorStop(0,'#000000');
  sky.addColorStop(0.55,'#02040e');
  sky.addColorStop(1,'#050c18');
  cx.fillStyle=sky; cx.fillRect(0,0,W,H*0.72);

  const gnd=cx.createLinearGradient(0,H*0.72,0,H);
  gnd.addColorStop(0,'#050c18');
  gnd.addColorStop(0.4,'#03080f');
  gnd.addColorStop(1,'#000');
  cx.fillStyle=gnd; cx.fillRect(0,H*0.72,W,H*0.28);

  fog.forEach(f=>{
    f.x+=f.speed;
    if(f.x>W+f.r) f.x=-f.r;
    if(f.x<-f.r) f.x=W+f.r;
    const g=cx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r);
    g.addColorStop(0,`rgba(77,184,212,${f.a})`);
    g.addColorStop(1,'transparent');
    cx.fillStyle=g;
    cx.beginPath();cx.arc(f.x,f.y,f.r,0,Math.PI*2);cx.fill();
  });

  lights.forEach(l=>{
    l.x+=l.drift;
    if(l.x>W+10) l.x=-10;
    if(l.x<-10) l.x=W+10;
    const yPos=l.yFrac*H + Math.sin(t*l.bobSpeed+l.ph)*l.bobAmp;
    const a=l.baseA*(0.65+0.35*Math.sin(t*55*l.flk+l.ph));
    cx.globalAlpha=a;
    cx.fillStyle=l.col;
    cx.beginPath(); cx.arc(l.x,yPos,l.r,0,Math.PI*2); cx.fill();
    const g=cx.createRadialGradient(l.x,yPos,0,l.x,yPos,l.r*9);
    g.addColorStop(0,l.col==='#fff'?`rgba(255,255,255,${a*0.22})` :`rgba(200,220,255,${a*0.18})`);
    g.addColorStop(1,'transparent');
    cx.fillStyle=g;
    cx.beginPath(); cx.arc(l.x,yPos,l.r*9,0,Math.PI*2); cx.fill();
    cx.globalAlpha=1;
  });

  streaks.forEach(s=>{
    s.x+=s.drift;
    if(s.x>W) s.x=0;
    if(s.x<0) s.x=W;
    cx.globalAlpha=s.a*(0.55+0.45*Math.sin(t*2.2+s.x*0.008));
    cx.fillStyle='#fff';
    cx.fillRect(s.x,s.yFrac*H,s.w,s.h);
    cx.globalAlpha=1;
  });

  drops.forEach(d=>{
    d.y+=d.speed;
    if(d.y>H*0.88){ d.y=Math.random()*-300; d.x=Math.random()*W; }
    if(d.y>H*0.85) return;
    const fade=d.y<H*0.63?1:Math.max(0,1-(d.y-H*0.63)/(H*0.22));
    cx.strokeStyle=`rgba(255,255,255,${d.alpha*fade})`;
    cx.lineWidth=d.w;
    cx.beginPath(); cx.moveTo(d.x,d.y); cx.lineTo(d.x+0.5,d.y+d.len); cx.stroke();
    if(d.bright&&fade>0.3){
      cx.strokeStyle=`rgba(255,255,255,${Math.min(1,d.alpha*fade*1.8)})`;
      cx.lineWidth=d.w+0.6;
      cx.beginPath(); cx.moveTo(d.x,d.y); cx.lineTo(d.x+0.3,d.y+7); cx.stroke();
    }
  });

  requestAnimationFrame(frame);
}
frame();

// TYPING BIO (ohne Prompt-Zeichen)
const bio=document.getElementById('bio');
const txt='Chatter & Self-taught Coder / Developer';
let i=0;
const cur=document.createElement('span'); cur.className='cursor-blink';
const ti=setInterval(()=>{
  if(i<txt.length){
    bio.textContent=txt.slice(0,i+1);
    bio.appendChild(cur);
    i++;
  } else {
    clearInterval(ti);
    setTimeout(()=>{
      bio.innerHTML = '<span class="accent">Chatter &amp; Self-taught Coder / Developer</span>';
      bio.appendChild(cur);
    },400);
  }
},48);

// RIPPLE
document.querySelectorAll('.link-card').forEach(c=>{
  c.addEventListener('click',e=>{
    const r=c.getBoundingClientRect(),el=document.createElement('span');
    el.className='ripple';const s=Math.max(r.width,r.height)*2;
    el.style.cssText=`width:${s}px;height:${s}px;left:${e.clientX-r.left-s/2}px;top:${e.clientY-r.top-s/2}px`;
    c.appendChild(el); setTimeout(()=>el.remove(),600);
  });
});

// USERNAME SPARKLES
const usernameEl=document.getElementById('username');
function spawnSparkle(){
  const s=document.createElement('span');
  s.className='sparkle';
  const x=Math.random()*100;
  const y=Math.random()*100;
  s.style.left=x+'%';
  s.style.top=y+'%';
  s.style.animationDelay=(Math.random()*0.3)+'s';
  s.style.animationDuration=(1.2+Math.random()*1.5)+'s';
  const sz=4+Math.random()*8;
  s.style.width=sz+'px';
  s.style.height=sz+'px';
  usernameEl.appendChild(s);
  setTimeout(()=>s.remove(),2800);
}
usernameEl.style.position='relative';
usernameEl.style.display='inline-block';
setInterval(spawnSparkle,260);
for(let k=0;k<5;k++) setTimeout(spawnSparkle,k*120);

// FOOTER SPARKLES
const footerEl=document.getElementById('footerInner');
function spawnFooterSparkle(){
  const s=document.createElement('span');
  s.className='footer-sparkle';
  s.style.left=(Math.random()*110-5)+'%';
  s.style.top=(Math.random()*140-20)+'%';
  s.style.animationDelay=(Math.random()*0.5)+'s';
  s.style.animationDuration=(1.5+Math.random()*2)+'s';
  const sz=3+Math.random()*6;
  s.style.width=sz+'px';
  s.style.height=sz+'px';
  footerEl.appendChild(s);
  setTimeout(()=>s.remove(),3500);
}
setInterval(spawnFooterSparkle,300);
for(let k=0;k<4;k++) setTimeout(spawnFooterSparkle,k*150);
</script>
