<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaspurrr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;600&family=Unbounded:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0b14;--bg2:#12121e;--accent:#7c3aed;--accent-glow:#7c3aed55;--text:#e8e8f0;--text-muted:#6e6e88;--card-bg:#ffffff06;--card-border:#ffffff0e;--card-hover:#ffffff12;--radius:14px;--font-display:'Unbounded',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'Fira Code',monospace}
html{font-size:16px}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(var(--card-border) 1px,transparent 1px),linear-gradient(90deg,var(--card-border) 1px,transparent 1px);background-size:50px 50px;opacity:.35}
.bg-glow{position:fixed;top:-250px;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);filter:blur(90px);opacity:.35;pointer-events:none;z-index:0}
.bg-noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.profile-page{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:70px 20px 80px;min-height:100vh}

.avatar-wrap{position:relative;margin-bottom:22px}
.avatar{width:130px;height:130px;border-radius:50%;border:3px solid var(--accent);object-fit:cover;box-shadow:0 0 35px var(--accent-glow),0 0 70px var(--accent-glow);background:var(--bg2)}
.avatar-placeholder{width:130px;height:130px;border-radius:50%;border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:52px;font-weight:900;color:var(--accent);background:var(--bg2);box-shadow:0 0 35px var(--accent-glow);font-family:var(--font-display)}
.status-dot{position:absolute;bottom:10px;right:10px;width:18px;height:18px;border-radius:50%;background:#22c55e;border:3.5px solid var(--bg);box-shadow:0 0 10px #22c55e88;z-index:3}

.username{font-family:var(--font-display);font-size:2.8rem;font-weight:800;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent),white 45%));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;text-align:center}

.bio{color:var(--text-muted);font-size:.92rem;margin-bottom:28px;text-align:center;max-width:400px;min-height:1.4em;font-family:var(--font-mono)}
.bio .cursor-blink{display:inline-block;width:2px;height:1em;background:var(--accent);margin-left:2px;animation:blink .7s infinite;vertical-align:text-bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.socials{display:flex;gap:12px;margin-bottom:38px}
.social-icon{width:46px;height:46px;border-radius:12px;background:var(--card-bg);border:1px solid var(--card-border);display:flex;align-items:center;justify-content:center;color:var(--text-muted);text-decoration:none;transition:all .25s}
.social-icon:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-4px) scale(1.08);box-shadow:0 8px 25px var(--accent-glow)}
.social-icon svg{width:20px;height:20px;fill:currentColor}

.links-container{display:flex;flex-direction:column;gap:12px;width:100%;max-width:440px}
.link-card{position:relative;overflow:hidden;display:flex;align-items:center;gap:14px;padding:15px 22px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);text-decoration:none;color:var(--text);transition:all .28s;backdrop-filter:blur(12px);cursor:pointer}
.link-card:hover{background:var(--card-hover);border-color:var(--accent);transform:translateY(-3px) scale(1.015);box-shadow:0 12px 40px #00000050,0 0 25px var(--accent-glow)}
.link-card .ripple{position:absolute;border-radius:50%;background:var(--accent);opacity:.2;transform:scale(0);animation:rip .6s ease-out forwards;pointer-events:none}
@keyframes rip{to{transform:scale(4);opacity:0}}
.link-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent),black 25%));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.link-icon svg{width:18px;height:18px;fill:#fff}
.link-title{font-weight:600;font-size:.95rem}
.link-arrow{margin-left:auto;color:var(--text-muted);font-size:14px;transition:transform .25s,color .25s}
.link-card:hover .link-arrow{transform:translateX(5px);color:var(--accent)}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.profile-page>*{animation:fadeUp .6s ease backwards}
.profile-page>*:nth-child(1){animation-delay:.05s}
.profile-page>*:nth-child(2){animation-delay:.12s}
.profile-page>*:nth-child(3){animation-delay:.18s}
.profile-page>*:nth-child(4){animation-delay:.26s}
.profile-page>*:nth-child(5){animation-delay:.33s}

@media(max-width:520px){.username{font-size:2rem}.avatar,.avatar-placeholder{width:105px;height:105px}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#ffffff15;border-radius:3px}
</style>
</head>

<script>
// ═══ PARTICLES ═══
const cv=document.getElementById('bgCanvas'),cx=cv.getContext('2d');
let pts=[];
function rz(){cv.width=innerWidth;cv.height=innerHeight}
addEventListener('resize',rz);rz();
for(let i=0;i<55;i++)pts.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.6+.4,dx:(Math.random()-.5)*.28,dy:(Math.random()-.5)*.28,o:Math.random()*.45+.1});

function dp(){cx.clearRect(0,0,cv.width,cv.height);
pts.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0)p.x=cv.width;if(p.x>cv.width)p.x=0;if(p.y<0)p.y=cv.height;if(p.y>cv.height)p.y=0;
cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle=`rgba(124,58,237,${p.o})`;cx.fill()});
for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
if(d<110){cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);cx.strokeStyle=`rgba(124,58,237,${.07*(1-d/110)})`;cx.lineWidth=.5;cx.stroke()}}
requestAnimationFrame(dp)}
dp();

// ═══ TYPING ═══
const bio=document.getElementById('bio');
const txt='Im a Chatter / Developer';
let i=0;const cur=document.createElement('span');cur.className='cursor-blink';
const ti=setInterval(()=>{if(i<txt.length){bio.innerHTML=txt.slice(0,i+1);bio.appendChild(cur);i++}else clearInterval(ti)},50);

// ═══ RIPPLE ═══
document.querySelectorAll('.link-card').forEach(c=>{
  c.addEventListener('click',e=>{const rect=c.getBoundingClientRect(),r=document.createElement('span');r.className='ripple';const s=Math.max(rect.width,rect.height)*2;
  r.style.width=r.style.height=s+'px';r.style.left=(e.clientX-rect.left-s/2)+'px';r.style.top=(e.clientY-rect.top-s/2)+'px';c.appendChild(r);setTimeout(()=>r.remove(),600)})
});
</script>
