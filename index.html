<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaspurrr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;600&family=Lexend:wght@300;400;600;700;800&family=Poppins:wght@300;400;600;700;800&family=Rajdhani:wght@400;500;600;700&family=Syne:wght@400;600;700;800&family=Unbounded:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0b14;--bg2:#12121e;--accent:#7c3aed;--accent-glow:#7c3aed55;--text:#e8e8f0;--text-muted:#6e6e88;--card-bg:#ffffff06;--card-border:#ffffff0e;--card-hover:#ffffff12;--radius:14px;--font-display:'Unbounded',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'Fira Code',monospace}
html{font-size:16px}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .5s,color .3s}

/* ═══ BG ═══ */
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(var(--card-border) 1px,transparent 1px),linear-gradient(90deg,var(--card-border) 1px,transparent 1px);background-size:50px 50px;opacity:.35}
.bg-glow{position:fixed;top:-250px;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);filter:blur(90px);opacity:.35;pointer-events:none;z-index:0}
.bg-noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ═══ PROFILE ═══ */
.profile-page{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:70px 20px 80px;min-height:100vh}

.avatar-wrap{position:relative;margin-bottom:22px;cursor:pointer}
.avatar-wrap:hover .avatar-hint{opacity:1}
.avatar-hint{position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-size:.68rem;color:#fff;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;letter-spacing:.5px;text-transform:uppercase;z-index:2}
.avatar{width:130px;height:130px;border-radius:50%;border:3px solid var(--accent);object-fit:cover;box-shadow:0 0 35px var(--accent-glow),0 0 70px var(--accent-glow);background:var(--bg2)}
.avatar-placeholder{width:130px;height:130px;border-radius:50%;border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:52px;font-weight:900;color:var(--accent);background:var(--bg2);box-shadow:0 0 35px var(--accent-glow);font-family:var(--font-display)}
.status-dot{position:absolute;bottom:10px;right:10px;width:18px;height:18px;border-radius:50%;background:#22c55e;border:3.5px solid var(--bg);box-shadow:0 0 10px #22c55e88;z-index:3}

.username{font-family:var(--font-display);font-size:2.8rem;font-weight:800;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent),white 45%));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;text-align:center}

.bio{color:var(--text-muted);font-size:.92rem;margin-bottom:28px;text-align:center;max-width:400px;min-height:1.4em;font-family:var(--font-mono)}
.bio .cursor-blink{display:inline-block;width:2px;height:1em;background:var(--accent);margin-left:2px;animation:blink .7s infinite;vertical-align:text-bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.socials{display:flex;gap:12px;margin-bottom:38px}
.social-icon{width:46px;height:46px;border-radius:12px;background:var(--card-bg);border:1px solid var(--card-border);display:flex;align-items:center;justify-content:center;color:var(--text-muted);text-decoration:none;transition:all .25s}
.social-icon:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-4px) scale(1.08);box-shadow:0 8px 25px var(--accent-glow)}
.social-icon svg{width:20px;height:20px;fill:currentColor}

.links-container{display:flex;flex-direction:column;gap:12px;width:100%;max-width:440px}
.link-card{position:relative;overflow:hidden;display:flex;align-items:center;gap:14px;padding:15px 22px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);text-decoration:none;color:var(--text);transition:all .28s;backdrop-filter:blur(12px);cursor:pointer}
.link-card:hover{background:var(--card-hover);border-color:var(--accent);transform:translateY(-3px) scale(1.015);box-shadow:0 12px 40px #00000050,0 0 25px var(--accent-glow)}
.link-card .ripple{position:absolute;border-radius:50%;background:var(--accent);opacity:.2;transform:scale(0);animation:rip .6s ease-out forwards;pointer-events:none}
@keyframes rip{to{transform:scale(4);opacity:0}}
.link-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent),black 25%));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.link-icon svg{width:18px;height:18px;fill:#fff}
.link-title{font-weight:600;font-size:.95rem}
.link-arrow{margin-left:auto;color:var(--text-muted);font-size:14px;transition:transform .25s,color .25s}
.link-card:hover .link-arrow{transform:translateX(5px);color:var(--accent)}

/* ═══ SETTINGS ═══ */
.settings-toggle{position:fixed;bottom:24px;right:24px;z-index:1000;width:52px;height:52px;border-radius:14px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;box-shadow:0 4px 24px var(--accent-glow);transition:all .3s}
.settings-toggle:hover{transform:scale(1.1) rotate(45deg)}
.settings-overlay{position:fixed;inset:0;z-index:999;background:#000a;backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .3s}
.settings-overlay.open{opacity:1;pointer-events:all}
.settings-panel{position:fixed;right:-520px;top:0;bottom:0;z-index:1001;width:460px;max-width:100vw;background:var(--bg2);border-left:1px solid var(--card-border);overflow-y:auto;transition:right .4s cubic-bezier(.4,0,.2,1);padding:28px 24px 120px}
.settings-panel.open{right:0}
.settings-panel h2{font-family:var(--font-display);font-size:1.2rem;font-weight:700;margin-bottom:5px;color:#fff}
.settings-panel .sub{color:var(--text-muted);font-size:.8rem;margin-bottom:22px}
.ss{margin-bottom:24px}
.ss h3{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1.8px;color:var(--accent);margin-bottom:11px}
.sf{margin-bottom:11px}
.sf label{display:block;font-size:.76rem;color:var(--text-muted);margin-bottom:3px;font-weight:600}
.sf input[type="text"],.sf input[type="url"],.sf textarea,.sf select{width:100%;padding:9px 13px;background:var(--bg);border:1px solid var(--card-border);border-radius:10px;color:#fff;font-family:var(--font-body);font-size:.86rem;outline:none;transition:border-color .3s}
.sf input:focus,.sf textarea:focus,.sf select:focus{border-color:var(--accent)}
.sf textarea{resize:vertical;min-height:50px}
.sf select{cursor:pointer}
.sf input[type="color"]{width:44px;height:32px;border:none;cursor:pointer;background:none;border-radius:6px}
.color-row{display:flex;gap:12px;flex-wrap:wrap}
.color-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.color-item span{font-size:.66rem;color:var(--text-muted)}

.dz{width:100%;padding:24px 14px;border:2px dashed var(--card-border);border-radius:14px;text-align:center;color:var(--text-muted);font-size:.8rem;cursor:pointer;transition:all .25s;position:relative;background:var(--bg)}
.dz:hover,.dz.drag-over{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent),transparent 92%)}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer}
.dz .dz-p{max-width:70px;max-height:70px;border-radius:10px;margin:6px auto 0;display:block}
.dz-cur .dz-p{max-width:42px;max-height:42px;image-rendering:pixelated}

.lei{background:var(--bg);border:1px solid var(--card-border);border-radius:12px;padding:12px;margin-bottom:9px;position:relative}
.lei .lr{display:flex;gap:7px;margin-bottom:7px}
.lei input,.lei select{flex:1;padding:7px 11px;background:var(--bg2);border:1px solid var(--card-border);border-radius:8px;color:#fff;font-family:var(--font-body);font-size:.82rem;outline:none}
.lei input:focus,.lei select:focus{border-color:var(--accent)}
.led{position:absolute;top:7px;right:7px;background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px;opacity:.5;transition:opacity .2s}
.led:hover{opacity:1}

.sei{display:flex;gap:7px;margin-bottom:7px;align-items:center}
.sei select,.sei input{padding:7px 11px;background:var(--bg);border:1px solid var(--card-border);border-radius:8px;color:#fff;font-family:var(--font-body);font-size:.82rem;outline:none}
.sei input{flex:1}
.sei select:focus,.sei input:focus{border-color:var(--accent)}
.sed{background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px;opacity:.5;padding:3px}
.sed:hover{opacity:1}

.ba{width:100%;padding:9px;background:transparent;border:2px dashed var(--card-border);border-radius:12px;color:var(--text-muted);cursor:pointer;font-family:var(--font-body);font-size:.82rem;transition:all .2s}
.ba:hover{border-color:var(--accent);color:var(--accent)}
.bs{position:sticky;bottom:0;width:calc(100% + 48px);margin-left:-24px;padding:16px;background:var(--accent);border:none;color:#fff;font-family:var(--font-display);font-size:.92rem;font-weight:700;cursor:pointer;transition:filter .2s;letter-spacing:.5px}
.bs:hover{filter:brightness(1.15)}
.be{width:100%;padding:10px;margin-bottom:9px;background:transparent;border:1px solid var(--card-border);border-radius:12px;color:var(--text);font-family:var(--font-body);font-size:.82rem;cursor:pointer;transition:all .2s}
.be:hover{border-color:var(--accent);color:var(--accent)}
.pr{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.pb{padding:4px 11px;border-radius:20px;border:1px solid var(--card-border);background:transparent;color:var(--text-muted);font-size:.72rem;cursor:pointer;font-family:var(--font-body);transition:all .2s}
.pb:hover{border-color:var(--accent);color:var(--accent)}
.tr{display:flex;align-items:center;justify-content:space-between;padding:5px 0}
.tr>label:first-child{font-size:.8rem;color:var(--text-muted);font-weight:500}
.ts{position:relative;width:40px;height:22px;cursor:pointer}
.ts input{display:none}
.tsl{position:absolute;inset:0;background:var(--card-border);border-radius:11px;transition:background .25s}
.tsl::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .25s}
.ts input:checked+.tsl{background:var(--accent)}
.ts input:checked+.tsl::after{transform:translateX(18px)}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.profile-page>*{animation:fadeUp .6s ease backwards}
.profile-page>*:nth-child(1){animation-delay:.05s}
.profile-page>*:nth-child(2){animation-delay:.12s}
.profile-page>*:nth-child(3){animation-delay:.18s}
.profile-page>*:nth-child(4){animation-delay:.26s}
.profile-page>*:nth-child(5){animation-delay:.33s}
.profile-page>*:nth-child(6){animation-delay:.4s}

@media(max-width:520px){.settings-panel{width:100vw}.username{font-size:2rem}.avatar,.avatar-placeholder{width:105px;height:105px}}
.settings-panel::-webkit-scrollbar{width:4px}
.settings-panel::-webkit-scrollbar-track{background:transparent}
.settings-panel::-webkit-scrollbar-thumb{background:#ffffff18;border-radius:3px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#ffffff15;border-radius:3px}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="bg-grid" id="bgGrid"></div>
<div class="bg-glow" id="bgGlow"></div>
<div class="bg-noise"></div>

<div class="profile-page" id="pp">
  <div class="avatar-wrap" id="aw">
    <div class="avatar-placeholder" id="ae">J</div>
    <div class="status-dot"></div>
    <div class="avatar-hint">UPLOAD</div>
    <input type="file" id="afm" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer">
  </div>
  <div class="username" id="ue">Jaspurrr</div>
  <div class="bio" id="be"></div>
  <div class="socials" id="se"></div>
  <div class="links-container" id="le"></div>
</div>

<button class="settings-toggle" id="sb" title="Settings">&#9881;</button>
<div class="settings-overlay" id="so"></div>
<div class="settings-panel" id="sp">
  <h2>Einstellungen</h2>
  <p class="sub">Dein Profil, dein Style.</p>

  <div class="ss"><h3>PRESETS</h3><div class="pr" id="prow"></div></div>

  <div class="ss"><h3>PROFIL</h3>
    <div class="sf"><label>Name</label><input type="text" id="iName"></div>
    <div class="sf"><label>Bio</label><textarea id="iBio"></textarea></div>
    <div class="sf"><label>Profilbild (Drag &amp; Drop)</label><div class="dz" id="adz">&#128247; Bild hier reinziehen oder klicken<input type="file" id="af" accept="image/*"></div></div>
  </div>

  <div class="ss"><h3>FARBEN</h3>
    <div class="color-row">
      <div class="color-item"><input type="color" id="cBg"><span>BG</span></div>
      <div class="color-item"><input type="color" id="cBg2"><span>BG2</span></div>
      <div class="color-item"><input type="color" id="cAc"><span>Akzent</span></div>
      <div class="color-item"><input type="color" id="cTx"><span>Text</span></div>
      <div class="color-item"><input type="color" id="cMu"><span>Muted</span></div>
    </div>
  </div>

  <div class="ss"><h3>SCHRIFTART</h3>
    <div class="sf"><label>Display Font</label>
      <select id="iFont">
        <option value="'Unbounded', sans-serif">Unbounded</option>
        <option value="'Bebas Neue', sans-serif">Bebas Neue</option>
        <option value="'Syne', sans-serif">Syne</option>
        <option value="'Rajdhani', sans-serif">Rajdhani</option>
        <option value="'Lexend', sans-serif">Lexend</option>
        <option value="'Poppins', sans-serif">Poppins</option>
      </select>
    </div>
  </div>

  <div class="ss"><h3>EFFEKTE</h3>
    <div class="tr"><label>Grid</label><label class="ts"><input type="checkbox" id="tG"><span class="tsl"></span></label></div>
    <div class="tr"><label>Glow</label><label class="ts"><input type="checkbox" id="tW"><span class="tsl"></span></label></div>
    <div class="tr"><label>Partikel</label><label class="ts"><input type="checkbox" id="tP"><span class="tsl"></span></label></div>
    <div class="tr"><label>Typing-Animation</label><label class="ts"><input type="checkbox" id="tT"><span class="tsl"></span></label></div>
  </div>

  <div class="ss"><h3>CUSTOM CURSOR</h3>
    <div class="dz dz-cur" id="cdz">&#128433; Cursor-Bild (.png) reinziehen<input type="file" id="cf" accept="image/*,.cur"></div>
    <div style="margin-top:7px"><button class="ba" id="rc" style="font-size:.76rem">Cursor zur&#252;cksetzen</button></div>
  </div>

  <div class="ss"><h3>LINKS</h3><div id="lle"></div><button class="ba" id="al">+ Link hinzuf&#252;gen</button></div>
  <div class="ss"><h3>SOCIALS</h3><div id="sle"></div><button class="ba" id="as">+ Social hinzuf&#252;gen</button></div>

  <div class="ss"><h3>EXPORT / IMPORT</h3>
    <button class="be" id="ej">Config als JSON exportieren</button>
    <button class="be" id="ij">Config importieren</button>
    <input type="file" id="imf" accept=".json" style="display:none">
    <button class="be" id="eh">Als standalone HTML exportieren</button>
  </div>

  <button class="bs" id="sv">SPEICHERN</button>
</div>

const PRESETS={
  'Violet Night':{bg:'#0b0b14',bg2:'#12121e',accent:'#7c3aed',text:'#e8e8f0',muted:'#6e6e88'},
  'Cyber Red':{bg:'#0c0608',bg2:'#160a0e',accent:'#ef4444',text:'#f0e0e0',muted:'#a08080'},
  'Ocean':{bg:'#040e14',bg2:'#081820',accent:'#06b6d4',text:'#d0e8f0',muted:'#5090a0'},
  'Neon Green':{bg:'#030a03',bg2:'#061206',accent:'#22c55e',text:'#d0f0d0',muted:'#509050'},
  'Sunset':{bg:'#100806',bg2:'#1a100a',accent:'#f97316',text:'#f0e0d0',muted:'#a08060'},
  'Hot Pink':{bg:'#0e060c',bg2:'#180a14',accent:'#ec4899',text:'#f0d0e8',muted:'#a06090'},
  'Gold Lux':{bg:'#0c0a04',bg2:'#161208',accent:'#eab308',text:'#f0ead0',muted:'#a09060'},
  'Arctic':{bg:'#f0f3f8',bg2:'#e4e8f0',accent:'#3b82f6',text:'#1e293b',muted:'#64748b'},
  'Midnight':{bg:'#020208',bg2:'#06060e',accent:'#818cf8',text:'#c8c8e0',muted:'#5050a0'},
};

// ═══ DEFAULT: Jaspurrr ═══
let C={name:'Jaspurrr',bio:'I am Chatter / Developer',avatarData:'',cursorData:'',
  colors:{bg:'#0b0b14',bg2:'#12121e',accent:'#7c3aed',text:'#e8e8f0',muted:'#6e6e88'},
  font:"'Unbounded', sans-serif",fx:{grid:true,glow:true,particles:true,typing:true},
  links:[
    {title:'Portfolio',url:'https://example.com',icon:'website'},
    {title:'Discord Server',url:'https://discord.gg',icon:'discord'},
    {title:'GitHub',url:'https://github.com',icon:'github'},
  ],
  socials:[
    {platform:'twitch',url:'https://twitch.tv'},
    {platform:'twitter',url:'https://x.com'},
    {platform:'discord',url:'https://discord.gg'},
  ]};

try{const s=localStorage.getItem('lh3');if(s)C=JSON.parse(s)}catch(e){}

// ═══ PARTICLES ═══
const cv=document.getElementById('bgCanvas'),cx=cv.getContext('2d');
let pts=[],pon=true;
function rz(){cv.width=innerWidth;cv.height=innerHeight}
addEventListener('resize',rz);rz();
function mp(){pts=[];for(let i=0;i<55;i++)pts.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.6+.4,dx:(Math.random()-.5)*.28,dy:(Math.random()-.5)*.28,o:Math.random()*.45+.1})}
mp();
function hr(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function dp(){cx.clearRect(0,0,cv.width,cv.height);if(!pon){requestAnimationFrame(dp);return}
const[r,g,b]=hr(C.colors.accent);
pts.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0)p.x=cv.width;if(p.x>cv.width)p.x=0;if(p.y<0)p.y=cv.height;if(p.y>cv.height)p.y=0;
cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle=`rgba(${r},${g},${b},${p.o})`;cx.fill()});
for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
if(d<110){cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);cx.strokeStyle=`rgba(${r},${g},${b},${.07*(1-d/110)})`;cx.lineWidth=.5;cx.stroke()}}
requestAnimationFrame(dp)}
dp();

// ═══ TYPING ═══
let ti=null;
function tt(el,text){if(ti)clearInterval(ti);el.innerHTML='';let i=0;const cur=document.createElement('span');cur.className='cursor-blink';
ti=setInterval(()=>{if(i<text.length){el.innerHTML=text.slice(0,i+1);el.appendChild(cur);i++}else{clearInterval(ti);ti=null}},50)}

// ═══ RIPPLE ═══
function ar(e,c){const rect=c.getBoundingClientRect(),r=document.createElement('span');r.className='ripple';const s=Math.max(rect.width,rect.height)*2;
r.style.width=r.style.height=s+'px';r.style.left=(e.clientX-rect.left-s/2)+'px';r.style.top=(e.clientY-rect.top-s/2)+'px';c.appendChild(r);setTimeout(()=>r.remove(),600)}

// ═══ APPLY ═══
function apply(){const s=document.documentElement.style;
s.setProperty('--bg',C.colors.bg);s.setProperty('--bg2',C.colors.bg2);s.setProperty('--accent',C.colors.accent);s.setProperty('--accent-glow',C.colors.accent+'55');s.setProperty('--text',C.colors.text);s.setProperty('--text-muted',C.colors.muted);s.setProperty('--font-display',C.font);

document.getElementById('ue').textContent=C.name;document.getElementById('ue').style.fontFamily=C.font;
document.title=C.name;
const bio=document.getElementById('be');if(C.fx.typing)tt(bio,C.bio);else bio.textContent=C.bio;

const aw=document.getElementById('aw');
if(C.avatarData)aw.innerHTML='<img class="avatar" src="'+C.avatarData+'"><div class="status-dot"></div><div class="avatar-hint">\u00C4NDERN</div>';
else aw.innerHTML='<div class="avatar-placeholder">'+C.name.charAt(0).toUpperCase()+'</div><div class="status-dot"></div><div class="avatar-hint">UPLOAD</div>';
const fi=document.createElement('input');fi.type='file';fi.accept='image/*';fi.style.cssText='position:absolute;inset:0;opacity:0;cursor:pointer';
fi.addEventListener('change',e=>haf(e.target.files[0]));aw.appendChild(fi);

if(C.cursorData)document.body.style.cursor='url('+C.cursorData+') 0 0, auto';else document.body.style.cursor='';

document.getElementById('bgGrid').style.display=C.fx.grid?'':'none';
document.getElementById('bgGlow').style.display=C.fx.glow?'':'none';
pon=C.fx.particles;

const sE=document.getElementById('se');sE.innerHTML='';
C.socials.forEach(s=>{const a=document.createElement('a');a.className='social-icon';a.href=s.url;a.target='_blank';a.rel='noopener';a.innerHTML=IC[s.platform]||IC.link;sE.appendChild(a)});

const lE=document.getElementById('le');lE.innerHTML='';
C.links.forEach(l=>{const a=document.createElement('a');a.className='link-card';a.href=l.url;a.target='_blank';a.rel='noopener';
a.innerHTML='<div class="link-icon">'+(IC[l.icon]||IC.link)+'</div><span class="link-title">'+l.title+'</span><span class="link-arrow">\u2192</span>';
a.addEventListener('click',e=>ar(e,a));lE.appendChild(a)});

localStorage.setItem('lh3',JSON.stringify(C))}

// ═══ FILE ═══
function f2b(f){return new Promise((r,j)=>{const rd=new FileReader();rd.onload=()=>r(rd.result);rd.onerror=j;rd.readAsDataURL(f)})}
async function haf(f){if(!f)return;C.avatarData=await f2b(f);apply();const d=document.getElementById('adz');if(d){let p=d.querySelector('.dz-p');if(!p){p=document.createElement('img');p.className='dz-p';d.appendChild(p)}p.src=C.avatarData}}
async function hcf(f){if(!f)return;C.cursorData=await f2b(f);apply();const d=document.getElementById('cdz');if(d){let p=d.querySelector('.dz-p');if(!p){p=document.createElement('img');p.className='dz-p';d.appendChild(p)}p.src=C.cursorData}}
function sdz(el,h){el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over')});el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');h(e.dataTransfer.files[0])});const i=el.querySelector('input[type="file"]');if(i)i.addEventListener('change',e=>h(e.target.files[0]))}

// ═══ SETTINGS ═══
const pn=document.getElementById('sp'),ov=document.getElementById('so');
function os(){pn.classList.add('open');ov.classList.add('open');pop()}
function cs(){pn.classList.remove('open');ov.classList.remove('open')}
document.getElementById('sb').addEventListener('click',os);ov.addEventListener('click',cs);

const pw=document.getElementById('prow');
Object.entries(PRESETS).forEach(([n,c])=>{const b=document.createElement('button');b.className='pb';b.textContent=n;
b.addEventListener('click',()=>{document.getElementById('cBg').value=c.bg;document.getElementById('cBg2').value=c.bg2;document.getElementById('cAc').value=c.accent;document.getElementById('cTx').value=c.text;document.getElementById('cMu').value=c.muted});pw.appendChild(b)});

function pop(){
document.getElementById('iName').value=C.name;document.getElementById('iBio').value=C.bio;
document.getElementById('cBg').value=C.colors.bg;document.getElementById('cBg2').value=C.colors.bg2;document.getElementById('cAc').value=C.colors.accent;document.getElementById('cTx').value=C.colors.text;document.getElementById('cMu').value=C.colors.muted;
document.getElementById('iFont').value=C.font;document.getElementById('tG').checked=C.fx.grid;document.getElementById('tW').checked=C.fx.glow;document.getElementById('tP').checked=C.fx.particles;document.getElementById('tT').checked=C.fx.typing;

const aD=document.getElementById('adz');let aP=aD.querySelector('.dz-p');
if(C.avatarData){if(!aP){aP=document.createElement('img');aP.className='dz-p';aD.appendChild(aP)}aP.src=C.avatarData}else if(aP)aP.remove();
const cD=document.getElementById('cdz');let cP=cD.querySelector('.dz-p');
if(C.cursorData){if(!cP){cP=document.createElement('img');cP.className='dz-p';cD.appendChild(cP)}cP.src=C.cursorData}else if(cP)cP.remove();

sdz(document.getElementById('adz'),haf);sdz(document.getElementById('cdz'),hcf);

const ll=document.getElementById('lle');ll.innerHTML='';C.links.forEach((l,i)=>ll.appendChild(mle(l,i)));
const sl=document.getElementById('sle');sl.innerHTML='';C.socials.forEach((s,i)=>sl.appendChild(mse(s,i)))}

function mle(lk,i){const d=document.createElement('div');d.className='lei';
const o=Object.keys(IC).map(k=>'<option value="'+k+'" '+(lk.icon===k?'selected':'')+'>'+k+'</option>').join('');
d.innerHTML='<button class="led" data-i="'+i+'">&#10005;</button><div class="lr"><input type="text" placeholder="Titel" value="'+lk.title+'" data-f="title"><select data-f="icon" style="width:105px">'+o+'</select></div><input type="url" placeholder="https://..." value="'+lk.url+'" data-f="url">';
d.querySelector('.led').addEventListener('click',()=>{C.links.splice(i,1);pop()});return d}

function mse(sc,i){const d=document.createElement('div');d.className='sei';
const o=Object.keys(IC).map(p=>'<option value="'+p+'" '+(sc.platform===p?'selected':'')+'>'+p+'</option>').join('');
d.innerHTML='<select data-f="platform">'+o+'</select><input type="url" placeholder="https://..." value="'+sc.url+'" data-f="url"><button class="sed">&#10005;</button>';
d.querySelector('.sed').addEventListener('click',()=>{C.socials.splice(i,1);pop()});return d}

document.getElementById('al').addEventListener('click',()=>{C.links.push({title:'New Link',url:'https://',icon:'link'});pop()});
document.getElementById('as').addEventListener('click',()=>{C.socials.push({platform:'twitter',url:'https://'});pop()});

document.getElementById('sv').addEventListener('click',()=>{
C.name=document.getElementById('iName').value;C.bio=document.getElementById('iBio').value;
C.colors.bg=document.getElementById('cBg').value;C.colors.bg2=document.getElementById('cBg2').value;C.colors.accent=document.getElementById('cAc').value;C.colors.text=document.getElementById('cTx').value;C.colors.muted=document.getElementById('cMu').value;
C.font=document.getElementById('iFont').value;C.fx.grid=document.getElementById('tG').checked;C.fx.glow=document.getElementById('tW').checked;C.fx.particles=document.getElementById('tP').checked;C.fx.typing=document.getElementById('tT').checked;

C.links=[];document.querySelectorAll('.lei').forEach(item=>{C.links.push({title:item.querySelector('[data-f="title"]').value,url:item.querySelector('[data-f="url"]').value,icon:item.querySelector('[data-f="icon"]').value})});
C.socials=[];document.querySelectorAll('.sei').forEach(item=>{C.socials.push({platform:item.querySelector('[data-f="platform"]').value,url:item.querySelector('[data-f="url"]').value})});
apply();cs()});

document.getElementById('ej').addEventListener('click',()=>{const b=new Blob([JSON.stringify(C,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='linkhub-config.json';a.click()});
document.getElementById('ij').addEventListener('click',()=>document.getElementById('imf').click());
document.getElementById('imf').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{C=JSON.parse(ev.target.result);apply();pop()}catch(err){alert('Ung\u00fcltige JSON')}};r.readAsText(f)});
document.getElementById('rc').addEventListener('click',()=>{C.cursorData='';apply();const d=document.getElementById('cdz');const p=d.querySelector('.dz-p');if(p)p.remove()});
document.getElementById('eh').addEventListener('click',()=>{const b=new Blob(['<!DOCTYPE html>\n'+document.documentElement.outerHTML],{type:'text/html'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='my-linkhub.html';a.click()});

document.getElementById('afm')?.addEventListener('change',e=>haf(e.target.files[0]));
apply();
</script>
</body>
</html>
